name: Docker

on:
  push:
    tags: ['v*.*.*']    # branch-push trigger removed — PRs already validate before merge
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: 'pip'   # skip re-downloading packages when requirements.txt is unchanged

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

  scan:
    needs: test
    runs-on: ubuntu-latest
    # Run on PRs to main (pre-release gate) and on tag pushes (pre-publish gate).
    # Skip on PRs to develop — the scan runs again on the release PR to main.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: imax-alert:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — scan image for OS and library CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: imax-alert:scan
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  build-and-push:
    needs: [test, scan]
    runs-on: ubuntu-latest
    # Only push to Docker Hub on a version tag push — not on branch merges.
    # This keeps `latest` in sync with explicit releases rather than every main merge.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/imax-alert
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
