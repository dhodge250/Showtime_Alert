<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – IMAX Alert</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-brand">
      <span class="login-logo">🎬</span>
      <h1 class="login-title">IMAX Alert</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <div class="card login-card">
      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" class="form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label for="email">Username / Email</label>
          <input type="text" id="email" name="email" class="form-control"
                 placeholder="admin" autocomplete="username" required autofocus />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="form-group checkbox-row">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" />
            <span>Remember me</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
