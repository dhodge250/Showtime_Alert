<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – IMAX Alert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">
  <div class="login-split">
    <!-- Left: brand panel -->
    <div class="login-brand-panel">
      <div class="login-brand-inner">
        <h1 class="login-title"><span class="login-title-imax">IMAX</span> ALERT</h1>
        <p class="login-tagline">Never miss an IMAX showtime.<br>Get notified the moment tickets go on sale.</p>
        <ul class="login-feature-list">
          <li>Track movies at any IMAX theater</li>
          <li>Email &amp; SMS notifications</li>
          <li>370+ IMAX theaters worldwide</li>
        </ul>
      </div>
    </div>

    <!-- Right: form panel -->
    <div class="login-form-panel">
      <div class="login-form-inner">
        <h2 class="login-form-heading">Sign in</h2>
        <p class="login-form-sub">Welcome back — enter your credentials below</p>

        {% if error %}
          <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" class="form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="form-group">
            <label for="email">Username / Email</label>
            <input type="text" id="email" name="email" class="form-control"
                   placeholder="Enter your username" autocomplete="username" required autofocus />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="••••••••" autocomplete="current-password" required />
          </div>

          <div class="login-remember-row">
            <label class="login-remember-label">
              <input type="checkbox" name="remember" />
              <span>Remember me</span>
            </label>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Sign In</button>
        </form>

        <div style="margin-top:12px;text-align:center;font-size:13px;color:var(--text-muted)">
          <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--accent)">Forgot password?</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
