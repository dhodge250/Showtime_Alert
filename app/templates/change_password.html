<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password – IMAX Alert</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-brand">
      <span class="login-logo">🎬</span>
      <h1 class="login-title">IMAX Alert</h1>
      <p class="login-subtitle">Set your password</p>
    </div>

    <div class="card login-card">
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px">
        For security, you must set a new password before continuing.
        Choose something strong — at least 8 characters.
      </p>

      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.change_password') }}" class="form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label for="new_password">New Password</label>
          <input type="password" id="new_password" name="new_password" class="form-control"
                 placeholder="At least 8 characters" autocomplete="new-password"
                 minlength="8" required autofocus />
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="Repeat your new password" autocomplete="new-password"
                 minlength="8" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">Set Password</button>
      </form>

      <div style="margin-top:16px;text-align:center">
        <form method="POST" action="{{ url_for('auth.logout') }}" style="display:inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-ghost btn-sm">Log out</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
